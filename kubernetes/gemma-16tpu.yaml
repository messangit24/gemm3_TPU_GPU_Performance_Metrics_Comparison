apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: gemma3-27b-16tpu
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 4  # 1 Leader Pod + 3 Worker Pods
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          app: gemma3-16tpu
          role: leader
      spec:
        nodeSelector:
          cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
          cloud.google.com/gke-tpu-topology: 4x4
          cloud.google.com/gke-nodepool: mb-tpu-v6e-multi-16
        containers:
        - name: vllm-leader
          image: vllm/vllm-tpu:latest
          # The Bulletproof Hot-Patch: Mocks the entire memory_stats dictionary
          command:
            - sh
            - -c
            - |
              sed -i 's/device.memory_stats()/{"bytes_in_use": 0, "bytes_limit": 1}/g' /workspace/tpu_inference/tpu_inference/utils.py || true
              vllm serve google/gemma-3-27b-it --tensor-parallel-size=16 --port=8000
          ports:
            - containerPort: 8000
          resources:
            limits:
              google.com/tpu: "4"
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
    workerTemplate:
      spec:
        nodeSelector:
          cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
          cloud.google.com/gke-tpu-topology: 4x4
          cloud.google.com/gke-nodepool: mb-tpu-v6e-multi-16
        containers:
        - name: vllm-worker
          image: vllm/vllm-tpu:latest
          # Applied to workers as well!
          command:
            - sh
            - -c
            - |
              sed -i 's/device.memory_stats()/{"bytes_in_use": 0, "bytes_limit": 1}/g' /workspace/tpu_inference/tpu_inference/utils.py || true
              vllm serve google/gemma-3-27b-it --tensor-parallel-size=16 --port=8000
          resources:
            limits:
              google.com/tpu: "4"
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-service-16tpu
spec:
  selector:
    app: gemma3-16tpu
    role: leader
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
