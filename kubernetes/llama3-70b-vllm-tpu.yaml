apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: vllm-llama70b
  namespace: default
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          app: vllm-llama70b
          role: leader
      spec:
        subdomain: vllm-llama70b
        nodeSelector:
          cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
          cloud.google.com/gke-tpu-topology: 2x4
        tolerations:
        - key: "google.com/tpu"
          operator: "Exists"
          effect: "NoSchedule"
        containers:
        - name: vllm
          image: docker.io/vllm/vllm-tpu:latest
          imagePullPolicy: Always
          command:
          - bash
          - -c
          - |
            set -euo pipefail

            echo "=============================================="
            echo "LEADER: vLLM on TPU multi-host (JAX native)"
            echo "Pod IP   : $(hostname -i | awk '{print $1}')"
            echo "Hostname  : $(hostname)"
            echo "TPU_WORKER_ID: $TPU_WORKER_ID"
            echo "TPU_WORKER_HOSTNAMES: $TPU_WORKER_HOSTNAMES"
            echo "TPU_PROCESS_ADDRESSES: $TPU_PROCESS_ADDRESSES"
            echo "=============================================="

            python3 -m vllm.entrypoints.openai.api_server \
              --host=0.0.0.0 \
              --port=8000 \
              --model=meta-llama/Llama-3.1-70B-Instruct \
              --served-model-name=meta-llama/Llama-3.1-70B-Instruct \
              --tensor-parallel-size=8 \
              --max-model-len=4096 \
              --max-num-seqs=16 \
              --dtype=bfloat16 \
              --download-dir=/data
          ports:
          - name: http
            containerPort: 8000
          env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-token
                key: HF_TOKEN
          - name: HUGGING_FACE_HUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-token
                key: HF_TOKEN
          - name: HF_HOME
            value: /data/hf
          - name: VLLM_XLA_CACHE_PATH
            value: /data/vllm-xla-cache
          - name: PJRT_DEVICE
            value: TPU
          - name: VLLM_WORKER_MULTIPROC_METHOD
            value: spawn
          resources:
            requests:
              cpu: "16"
              memory: "100Gi"
            limits:
              google.com/tpu: "4"
              cpu: "32"
              memory: "200Gi"
          volumeMounts:
          - name: data
            mountPath: /data
          - name: dshm
            mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 120
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
        volumes:
        - name: data
          emptyDir:
            sizeLimit: 200Gi
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
    workerTemplate:
      spec:
        subdomain: vllm-llama70b
        nodeSelector:
          cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
          cloud.google.com/gke-tpu-topology: 2x4
        tolerations:
        - key: "google.com/tpu"
          operator: "Exists"
          effect: "NoSchedule"
        containers:
        - name: vllm-worker
          image: docker.io/vllm/vllm-tpu:latest
          imagePullPolicy: Always
          command:
          - bash
          - -c
          - |
            set -euo pipefail

            echo "=============================================="
            echo "WORKER: vLLM on TPU multi-host (JAX native)"
            echo "Pod IP   : $(hostname -i | awk '{print $1}')"
            echo "Hostname  : $(hostname)"
            echo "TPU_WORKER_ID: $TPU_WORKER_ID"
            echo "TPU_WORKER_HOSTNAMES: $TPU_WORKER_HOSTNAMES"
            echo "TPU_PROCESS_ADDRESSES: $TPU_PROCESS_ADDRESSES"
            echo "=============================================="

            python3 -m vllm.entrypoints.openai.api_server \
              --host=0.0.0.0 \
              --port=8000 \
              --model=meta-llama/Llama-3.1-70B-Instruct \
              --served-model-name=meta-llama/Llama-3.1-70B-Instruct \
              --tensor-parallel-size=8 \
              --max-model-len=4096 \
              --max-num-seqs=16 \
              --dtype=bfloat16 \
              --download-dir=/data
          env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-token
                key: HF_TOKEN
          - name: HUGGING_FACE_HUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-token
                key: HF_TOKEN
          - name: HF_HOME
            value: /data/hf
          - name: VLLM_XLA_CACHE_PATH
            value: /data/vllm-xla-cache
          - name: PJRT_DEVICE
            value: TPU
          - name: VLLM_WORKER_MULTIPROC_METHOD
            value: spawn
          resources:
            requests:
              cpu: "16"
              memory: "100Gi"
            limits:
              google.com/tpu: "4"
              cpu: "32"
              memory: "200Gi"
          volumeMounts:
          - name: data
            mountPath: /data
          - name: dshm
            mountPath: /dev/shm
        volumes:
        - name: data
          emptyDir:
            sizeLimit: 200Gi
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-llama70b
  namespace: default
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    leaderworkerset.sigs.k8s.io/name: vllm-llama70b
  ports:
  - name: http
    port: 8000
    targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-service-8tpu
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: vllm-llama70b
    role: leader
  ports:
  - name: http
    protocol: TCP
    port: 8000
    targetPort: 8000
