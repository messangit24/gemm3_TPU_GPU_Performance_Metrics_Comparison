apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: gemma3-27b-tgi
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 4
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          app: gemma3-tgi
          role: leader
      spec:
        nodeSelector:
          cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
          cloud.google.com/gke-tpu-topology: 4x4
          cloud.google.com/gke-nodepool: mb-tpu-v6e-multi-16
        containers:
        - name: tgi-server
          # Correct versioned XLA tag
          image: ghcr.io/huggingface/optimum-tpu:v0.2.3-tgi
          command:
            - text-generation-launcher
            - --model-id
            - google/gemma-3-27b-it
            - --port
            - "8000"
          ports:
            - containerPort: 8000
          resources:
            limits:
              google.com/tpu: "4"
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
    workerTemplate:
      spec:
        nodeSelector:
          cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
          cloud.google.com/gke-tpu-topology: 4x4
          cloud.google.com/gke-nodepool: mb-tpu-v6e-multi-16
        containers:
        - name: tgi-worker
          # Correct versioned XLA tag
          image: ghcr.io/huggingface/optimum-tpu:v0.2.3-tgi
          command:
            - text-generation-launcher
            - --model-id
            - google/gemma-3-27b-it
            - --port
            - "8000"
          resources:
            limits:
              google.com/tpu: "4"
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-service-16tpu
spec:
  selector:
    app: gemma3-tgi
    role: leader
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
